<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘記密碼</title>
    <!-- 引入模板的 CSS 檔案 -->
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        /* 依模板風格調整自定義樣式 */
        .forgot-container {
            text-align: center;
            margin-top: 10%;
        }
        .forgot-container h2 {
            margin-bottom: 20px;
        }
        .forgot-container input {
            width: 50%;
            margin: 10px 0;
        }
        .result {
            font-weight: bold;
            margin-top: 15px;
        }
        .success {
            color: green;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <section id="banner" class="major">
        <div class="inner">
            <header class="major">
                <h1>忘記密碼</h1>
            </header>
            <div class="content forgot-container">
                <h2>請回答安全問題</h2>
                <p><strong>請問高雄大學校長是誰？</strong> <br>(要全名)</p>
                <input type="text" id="answer" placeholder="請輸入答案" required>
                <br>
                <button class="button primary" onclick="validateAnswer()">確認</button>
                <p id="result" class="result"></p>
            </div>
        </div>
    </section>

    <!-- 引入模板的 JS -->
    <script src="assets/js/main.js"></script>
    <script>
        function validateAnswer() {
            const correctAnswer = "陳啟仁";
            const userAnswer = document.getElementById("answer").value.trim();
            const resultElement = document.getElementById("result");

            if (userAnswer === correctAnswer) {
                resultElement.innerHTML = "<span class='success'>答案正確！<br>5秒後自動跳轉至主頁面...</span>";
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 5000);
            } else {
                resultElement.innerHTML = "<span class='error'>答案錯誤，請再試一次。</span>";
            }
        }
    </script>
</body>
</html>
