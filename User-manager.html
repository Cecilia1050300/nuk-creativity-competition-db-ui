<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員資料管理子系統</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #003366; /* 深藍色 */
            margin: 0;
            padding: 20px;
            color: #fff;
        }
        h1, h2 {
            text-align: center;
            color: #ffcc00; /* 金黃色 */
        }
        form, table {
            margin: auto;
            width: 60%;
            background-color: #ffffe0; /* 淺黃色背景 */
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 5px #aaa;
            color: #000;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }
        button {
            margin-top: 15px;
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        table {
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }

        input[type="text"], select {
    border: 1px solid #ccc;
    padding: 6px 12px;
    border-radius: 4px;
    }

    .container {
    display: flex;
    align-items: center;
}

label {
    margin-right: 8px;
}


    </style>
</head>
<body>
    <h1>會員資料管理子系統</h1>

    <!-- 新增/修改會員資料 -->
    <h2>新增 / 修改會員資料</h2>
    <form id="user-form">
        <label for="username">帳號 (唯一):</label>
        <input type="text" id="username" placeholder="輸入帳號" required>

        <label for="password">密碼:</label>
        <input type="password" id="password" placeholder="輸入密碼" required>

        <label for="email">電子郵件:</label>
        <input type="email" id="email" placeholder="輸入電子郵件" required>

        <label for="phone">聯絡電話:</label>
        <input type="tel" id="phone" placeholder="輸入電話號碼" required>

        <label for="user_type">使用者類型:</label>
        <select id="user_type" required>
            <option value="">選擇角色</option>
            <option value="系統管理員">系統管理員</option>
            <option value="學生">學生</option>
            <option value="指導老師">指導老師</option>
            <option value="評審">評審</option>
        </select>

        <label for="user_created_time">帳號創建時間:</label>
        <input type="text" id="user_created_time" readonly>

        <button type="button" onclick="saveUser()">儲存資料</button>
    </form>

    

            <div class="container">
                <label for="yearSelect">選擇年分：</label>
                <select id="yearSelect" name="year">
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                    <option value="2022">2022</option>
                    <option value="2021">2021</option>
                    <option value="2020">2020</option>
                </select>
            </div>

    <!-- 查詢會員資料 -->
    <h2>查詢會員資料</h2>
    <form id="search-form">
        <label for="search">輸入帳號或電子郵件查詢:</label>
        <input type="text" id="search" placeholder="輸入帳號或電子郵件">
        <button type="button" onclick="searchUser()">查詢</button>
    </form>

    <!-- 查詢結果展示 -->
    <h2>查詢結果</h2>
    <table id="result-table">
        <thead>
            <tr>
                <th>帳號</th>
                <th>電子郵件</th>
                <th>電話</th>
                <th>使用者類型</th>
                <th>創建時間</th>
                
            </tr>
            <tr>
                <th>a1115534</th>
                <th>a1115534@mail.nuk.edu.tw</th>
                <th>0929525566</th>
                <th>學生</th>
                <th>2024/12/16</th>
            </tr>
        </thead>
        <tbody id="result-body">
            <!-- 顯示查詢結果 -->
        </tbody>
    </table>

    <script>
        // 模擬資料庫，預設一些用戶
        let users = [
            { username: 'admin001', password: '1234', email: 'admin@example.com', phone: '0912345678', userType: '系統管理員', createdTime: '2024-12-01 10:00:00' },
            { username: 'student001', password: '5678', email: 'student@example.com', phone: '0987654321', userType: '學生', createdTime: '2024-12-02 14:30:00' }
        ];

        // 自動填寫當前時間
        document.getElementById('user_created_time').value = new Date().toISOString().slice(0, 19).replace('T', ' ');

        // 新增/修改會員資料
        function saveUser() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const userType = document.getElementById('user_type').value;
            const createdTime = document.getElementById('user_created_time').value;

            const existingUserIndex = users.findIndex(user => user.username === username);

            if (existingUserIndex >= 0) {
                users[existingUserIndex] = { username, password, email, phone, userType, createdTime };
                alert('會員資料已更新!');
            } else {
                users.push({ username, password, email, phone, userType, createdTime });
                alert('會員資料已新增!');
            }
            document.getElementById('user-form').reset();
            console.log(users);
        }

        // 查詢會員資料
        function searchUser() {
            const searchValue = document.getElementById('search').value.trim().toLowerCase();
            const resultBody = document.getElementById('result-body');
            resultBody.innerHTML = '';

            const results = users.filter(user => 
                user.username.toLowerCase().includes(searchValue) ||
                user.email.toLowerCase().includes(searchValue)
            );

            if (results.length > 0) {
                results.forEach(user => {
                    resultBody.innerHTML += `
                        <tr>
                            <td>${user.username}</td>
                            <td>${user.email}</td>
                            <td>${user.phone}</td>
                            <td>${user.userType}</td>
                            <td>${user.createdTime}</td>
                        </tr>`;
                });
            } else {
                alert('查無資料!');
            }
        }
    </script>
</body>
</html>
