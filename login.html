	<body class="is-preload">

		
		<!-- Wrapper -->
			<div id="wrapper">

				
				<!-- Main -->
					<section id="banner" class="major">

							<header class="major" >

							</header>

							<div class="content">
								
							</div>

				<!--log in-->
                <section id="login-section" class="major">
                    <div class="inner">
                        <header class="major">
                            <h2>登入</h2>
                        </header>
                        <div class="content">
                            <form action="/login" method="POST">
                                <div class="field">
                                    <label for="username">帳號</label>
                                    <input type="text" name="username" id="username" placeholder="輸入帳號" required />
                                </div>
                                <div class="field">
                                    <label for="password">密碼</label>
                                    <input type="password" name="password" id="password" placeholder="輸入密碼" required />
                                </div>
                                
                                <ul class="actions">
									<li><a href="index.html" class="button primary">登入</a></li>
								</ul>								
                                
                                <p class="forgot-password">
                                    <a href="forget.html">忘記密碼？</a>
                                </p>
                            </form>
                        </div>
                    </div>
                </section>
				<!-- Footer -->
					<footer id="footer">
						<div class="inner">
							<ul class="icons">
								<li><a href="#" class="icon brands alt fa-twitter"><span class="label">Twitter</span></a></li>
